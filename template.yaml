# Author: dhirenkumarsingh
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Document Query System - RAG API

Globals:
  Function:
    Timeout: 300
    MemorySize: 1024
    Runtime: python3.11
    Environment:
      Variables:
        VECTOR_DB: !Ref VectorDB
        PINECONE_API_KEY: !Ref PineconeApiKey
        PINECONE_INDEX: !Ref PineconeIndex
        OPENAI_API_KEY: !Ref OpenAIApiKey
        USE_OPENAI: !Ref UseOpenAI

Parameters:
  VectorDB:
    Type: String
    Default: faiss
    AllowedValues:
      - pinecone
      - faiss
  PineconeApiKey:
    Type: String
    NoEcho: true
    Default: ""
  PineconeIndex:
    Type: String
    Default: document-query-system
  OpenAIApiKey:
    Type: String
    NoEcho: true
    Default: ""
  UseOpenAI:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  S3Bucket:
    Type: String
    Default: ""

Resources:
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: GET,POST,DELETE,OPTIONS
        AllowHeaders: Content-Type,Authorization
        AllowOrigin: "'*'"

  UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: lambda_handler.handle_upload
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref S3Bucket
      Events:
        Upload:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /upload
            Method: POST

  QueryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: lambda_handler.handle_query
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref S3Bucket
      Events:
        Query:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /query
            Method: POST

  ListDocumentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: lambda_handler.handle_list_documents
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref S3Bucket
      Events:
        List:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /documents
            Method: GET

  DeleteDocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: lambda_handler.handle_delete_document
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref S3Bucket
      Events:
        Delete:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /documents/{document_id}
            Method: DELETE

  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: lambda_handler.lambda_handler
      Events:
        Health:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /health
            Method: GET

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod"
